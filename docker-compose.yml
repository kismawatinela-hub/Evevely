services:
  evelyn-soul:
    build: .
    container_name: evelyn-soul
    restart: unless-stopped
    env_file:
      - .env
    working_dir: /app
    volumes:
      # Keeps session, premium.json, proxies, config, hit files across rebuilds
      - ./:/app
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
